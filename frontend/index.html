
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email/PayPal Income Manager</title>
    <style>
      :root{--bg:#0f172a;--fg:#e2e8f0;--muted:#94a3b8;--card:#111827;--accent:#22d3ee;--border:#1f2937;}
      *{box-sizing:border-box}
      body{margin:0;background:#0b1021;color:var(--fg);font-family:Inter,system-ui,Arial,Helvetica,sans-serif}
      .container{max-width:1100px;margin:20px auto;padding:0 16px}
      .tabs{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
      .tab{background:#111827;border:1px solid var(--border);color:var(--fg);padding:10px 14px;border-radius:10px;cursor:pointer}
      .tab.active{outline:2px solid var(--accent);}
      .card{background:#0a0f1e;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
      input,select,button,textarea{background:#0a1226;color:var(--fg);border:1px solid var(--border);border-radius:10px;padding:8px}
      button{cursor:pointer}
      table{width:100%;border-collapse:collapse}
      th,td{border-bottom:1px solid var(--border);padding:8px;text-align:left}
      th{color:#a7b4cc;font-weight:600}
      tr:hover{background:#0e1531}
      .row{display:flex;gap:10px;flex-wrap:wrap}
      .row > *{flex:1}
      .muted{color:var(--muted)}
      .badge{background:#0e7490; padding:2px 8px; border-radius:999px; font-size:12px}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
